name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Decode keystore
      if: github.event_name == 'push'
      run: |
        printf '%s' "${{ secrets.SIGNING_KEY }}" | base64 -d > app/keystore.jks
        ls -la app/keystore.jks

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace 2>&1 | tail -200
      timeout-minutes: 30

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Build Release APK
      if: github.event_name == 'push'
      run: ./gradlew assembleRelease --stacktrace 2>&1 | tail -200
      env:
        KEYSTORE_FILE: app/keystore.jks
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        ALIAS: ${{ secrets.ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      timeout-minutes: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: github.event_name == 'push' && success()
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
